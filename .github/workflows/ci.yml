name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-import:
    name: lint + import smoke
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      # setup-uv v6 runs on Node 24 (Node 20 actions are deprecated June 2026)
      # and accepts `python-version` directly. It installs uv, then provisions
      # the requested Python via `uv python install` under the hood.
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: uv sync
        run: uv sync --extra dev

      - name: ruff
        run: uv run ruff check .

      - name: import smoke
        shell: bash
        run: |
          uv run python -c "
          import shortsmith
          import shortsmith.config
          import shortsmith.pipeline
          import shortsmith.transcribe
          import shortsmith.find_clips
          import shortsmith.cut_clips
          import shortsmith.clean_clips
          import shortsmith.enhance_audio
          import shortsmith.reframe
          import shortsmith.scaffold
          import shortsmith.captions
          import shortsmith.align
          import shortsmith.normalize
          import shortsmith.checkpoint
          import shortsmith.sfx
          import shortsmith.vfx
          print('OK')
          "

      - name: CLI help
        run: uv run shortsmith --help

      - name: pytest (unit tests)
        # pytest + pytest-mock are already installed by `uv sync --extra dev`;
        # no need to re-add them via --with.
        run: uv run pytest tests/ -v
